<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HA Exam Clock</title>

    <link rel="stylesheet" href="css/main.css" />
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon" />

    <script src="js/clock.js"></script>
    <script src="js/time-table.js"></script>
    <script defer src="js/main.js"></script>
  </head>
  <body>
    <nav>
      <button id="minus">- Font</button>
      <button id="plus">+ Font</button>
    </nav>

    <div id="clock-div">
      <div class="clock-container">
        <div class="info">
          <p>
            <span>Harry Ainlay High School</span> (School Code:
            <span>7059</span>)
          </p>
        </div>
        <div id="digital-clock">00:00:00</div>
        <p id="today">-----</p>
        <table class="styled-table">
          <thead>
            <tr>
              <th>Exam Name</th>
              <th>Start Time</th>
              <th>End Time</th>
              <th>Time Taken</th>
              <th></th>
            </tr>
          </thead>
          <tbody class="exam-times"></tbody>
        </table>
        <div>
          <button id="add-row">+</button>
        </div>
      </div>
    </div>
  </body>
</html>
